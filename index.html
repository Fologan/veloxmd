<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastMD — Real-time Markdown Editor</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <style>
    :root {
      --bg: var(--fastmd-bg, #ffffff);
      --surface: var(--fastmd-surface, #f6f8fa);
      --surface-2: var(--fastmd-surface-2, #eef1f5);
      --border: var(--fastmd-border, #d1d9e0);
      --border-bright: var(--fastmd-border-bright, #b8c0cc);
      --text: var(--fastmd-text, #1f2328);
      --text-bright: var(--fastmd-text-bright, #000000);
      --text-muted: var(--fastmd-text-muted, #636c76);
      --accent: var(--fastmd-accent, #0969da);
    }

    [data-theme="dark"] {
      --bg: var(--fastmd-bg);
      --surface: var(--fastmd-surface);
      --surface-2: var(--fastmd-surface-2);
      --border: var(--fastmd-border);
      --border-bright: var(--fastmd-border-bright);
      --text: var(--fastmd-text);
      --text-bright: var(--fastmd-text-bright);
      --text-muted: var(--fastmd-text-muted);
      --accent: var(--fastmd-accent);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-bright);
    }
    .header h1 .a { color: var(--accent); }

    .badge {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      background: var(--accent);
      color: #fff;
      border-radius: 3px;
      margin-left: 2px;
      vertical-align: middle;
    }

    .header .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }

    .header .btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .header .btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /* ---- Editor container ---- */

    .editor-wrap {
      flex: 1;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      padding: 48px 24px 120px;
    }

    .editor-wrap::-webkit-scrollbar { width: 8px; }
    .editor-wrap::-webkit-scrollbar-track { background: transparent; }
    .editor-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #editor-root {
      width: 100%;
      max-width: 720px;
    }

    /* ---- Footer ---- */

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 10px 24px;
      background: linear-gradient(transparent, var(--bg) 40%);
      pointer-events: none;
    }

    .shortcut {
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.5;
    }

    .shortcut kbd {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 10px;
      padding: 1px 5px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
    }

    /* ---- Responsive ---- */

    @media (max-width: 600px) {
      .editor-wrap { padding: 24px 16px 100px; }
      .live-editor { font-size: 15px; }
      .footer { gap: 10px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="a">Fast</span>MD <span class="badge">Live</span></h1>
    <button id="load-sample" class="btn">Load sample</button>
    <button id="theme-toggle" class="btn">Dark mode</button>
    <button id="view-mode-toggle" class="btn">Hybrid mode</button>
    <button id="insert-bold" class="btn">Insert bold</button>
    <span id="char-count" class="hint">0 chars</span>
    <span class="hint">Type markdown — it renders as you write</span>
  </div>

  <div class="editor-wrap">
    <div id="editor-root"></div>
    <div id="viewer-root" style="width:100%;max-width:720px;margin-top:48px;padding-top:24px;border-top:2px solid var(--border);"></div>
  </div>

  <div class="footer">
    <span class="shortcut"><kbd>#</kbd> Heading</span>
    <span class="shortcut"><kbd>**</kbd> Bold</span>
    <span class="shortcut"><kbd>*</kbd> Italic</span>
    <span class="shortcut"><kbd>`</kbd> Code</span>
    <span class="shortcut"><kbd>></kbd> Quote</span>
    <span class="shortcut"><kbd>-</kbd> List</span>
    <span class="shortcut"><kbd>~~</kbd> Strike</span>
  </div>

  <script type="module" src="/src/demo.ts"></script>
  <script>
    const toggle = document.getElementById('theme-toggle');
    toggle.addEventListener('click', () => {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        html.removeAttribute('data-theme');
        toggle.textContent = 'Dark mode';
      } else {
        html.setAttribute('data-theme', 'dark');
        toggle.textContent = 'Light mode';
      }
    });
  </script>
</body>
</html>
